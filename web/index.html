  <!-- Lightweight SEO Route Script -->
  <script>
    // Called by Flutter Web dynamically for SEO-enriched exercise pages
    window.setExerciseSEO = function(title, description, canonicalUrl, schemaJson) {
      document.title = title;
      
      let metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', description);

      let linkCanonical = document.querySelector('link[rel="canonical"]');
      if (linkCanonical) linkCanonical.setAttribute('href', canonicalUrl);
      
      // Cleanup any previously injected dynamic tags (OG, Twitter, JSON-LD)
      document.querySelectorAll('.dynamic-seo-tag').forEach(e => e.remove());

      const head = document.head;
      
      // Open Graph Tags
      const ogTitle = document.createElement('meta');
      ogTitle.setAttribute('property', 'og:title');
      ogTitle.setAttribute('content', title);
      ogTitle.className = 'dynamic-seo-tag';
      head.appendChild(ogTitle);
      
      const ogDesc = document.createElement('meta');
      ogDesc.setAttribute('property', 'og:description');
      ogDesc.setAttribute('content', description);
      ogDesc.className = 'dynamic-seo-tag';
      head.appendChild(ogDesc);
      
      const ogUrl = document.createElement('meta');
      ogUrl.setAttribute('property', 'og:url');
      ogUrl.setAttribute('content', canonicalUrl);
      ogUrl.className = 'dynamic-seo-tag';
      head.appendChild(ogUrl);

      // JSON-LD Schema
      if (schemaJson) {
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.text = schemaJson;
        script.className = 'dynamic-seo-tag';
        head.appendChild(script);
      }
    };

    function updateSEO() {
      const path = window.location.pathname;
      // Do not overwrite if we are on an exercise page (handled by Flutter setExerciseSEO)
      if (path.startsWith('/exercise/')) return;

      let title = "Gym Guide – Personalized Workout & Meal Plan App";
      let description = "Get your custom workout and meal plan in seconds. 1800+ exercises, fat loss & muscle gain programs. Download Gym Guide now.";
      let canonicalUrl = "https://www.gymguide.co" + (path === '/' ? '' : path);

      if (path === '/download') {
        title = "Download Gym Guide – Custom Workout & Meal Plan App";
        description = "Download Gym Guide and get a personalized fitness plan based on your goals. Build muscle, lose fat, and stay fit.";
      } else if (path === '/calculators/bmi') {
        title = "BMI Calculator – Check Your Body Mass Index Instantly";
        description = "Free BMI calculator. Check your body mass index instantly and get accurate results. Try it now.";
      } else if (path === '/calculators/calorie') {
        title = "Calorie Calculator – Daily Calories for Weight Loss & Muscle Gain";
        description = "Calculate your daily calorie needs for weight loss or muscle gain. Fast, accurate results.";
      } else if (path === '/calculators/macro') {
        title = "Macro Calculator – Protein, Carbs & Fat Intake Calculator";
        description = "Find your ideal macros for fat loss or muscle gain. Calculate protein, carbs, and fats.";
      } else if (path === '/calculators/bodyfat') {
        title = "Body Fat Calculator – Estimate Your Body Fat Percentage";
        description = "Estimate your body fat percentage and track your fitness progress.";
      } else if (path === '/calculators/onerm') {
        title = "1RM Calculator – One Rep Max Strength Calculator";
        description = "Calculate your one rep max and track your strength progress in the gym.";
      }

      document.title = title;
      
      let metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', description);

      let linkCanonical = document.querySelector('link[rel="canonical"]');
      if (linkCanonical) linkCanonical.setAttribute('href', canonicalUrl);
      
      // Cleanup dynamic SEO tags if navigating away from an exercise page
      document.querySelectorAll('.dynamic-seo-tag').forEach(e => e.remove());
    }

    // Run on initial load
    updateSEO();

    // Observe changes to the URL (for Flutter web router)
    let lastUrl = location.href; 
    function checkUrlChange() {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        updateSEO();
      }
    }

    window.addEventListener('popstate', checkUrlChange);
    window.addEventListener('hashchange', checkUrlChange);

    const originalPushState = history.pushState;
    history.pushState = function() {
      originalPushState.apply(this, arguments);
      checkUrlChange();
    };

    const originalReplaceState = history.replaceState;
    history.replaceState = function() {
      originalReplaceState.apply(this, arguments);
      checkUrlChange();
    };
  </script>
