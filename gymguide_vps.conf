map $http_user_agent $is_bot {
    default 0;
    ~*facebookexternalhit 1;
    ~*twitterbot 1;
    ~*whatsapp 1;
    ~*telegrambot 1;
    ~*slackbot 1;
    ~*discordbot 1;
    ~*googlebot 1;
    ~*applebot 1;
    ~*linkedinbot 1;
    ~*embedly 1;
    ~*imessage 1;
}

# Redirect gymguide.co → https://www.gymguide.co
server {
    server_name gymguide.co;
    return 301 https://www.gymguide.co$request_uri;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.gymguide.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.gymguide.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Main site
server {
    server_name www.gymguide.co;

    root /var/www/gymguide;
    index index.html;

    location = /download {
        if ($http_user_agent ~* "(iphone|ipad|ipod)") {
            return 302 https://apps.apple.com/us/app/gym-guide-app/id6760553535;
        }
        if ($http_user_agent ~* "android") {
            return 302 https://play.google.com/store/apps/details?id=com.gymguide.app;
        }
        return 302 https://gymguide.co;
    }

    # 0. Proof Route for Testing Bot Interception
    location = /exercise/test-bot-route {
        default_type text/html;
        if ($is_bot) {
            return 200 '<!DOCTYPE html>\n<html>\n<head>\n<meta property="og:title" content="BOT ROUTE WORKING">\n<meta property="og:image" content="https://www.gymguide.co/exercise/000112-3-4-Sit-up_Waist-FIX.jpg">\n</head>\n<body>Bot Test Route</body>\n</html>';
        }
        return 200 '<!DOCTYPE html>\n<html>\n<head>\n<title>NORMAL ROUTE WORKING</title>\n</head>\n<body>Normal User Test Route</body>\n</html>';
    }

    # 1. Dynamic AI Transformation Share Routing
    location ~* ^/transformation/share/([a-zA-Z0-9]+)/?$ {
        set $token $1;
        error_page 418 = @share_bot_proxy;
        if ($is_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    # 2. Named location for share bot proxying
    location @share_bot_proxy {
        proxy_set_header apikey "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indld3p0cGFtemhyemJiZ3l1dHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MTE5MzAsImV4cCI6MjA3OTM4NzkzMH0.PfmIQFT6QFZFAc_sseoaSqFNKbE_F1dua3J4G1SKkws";
        proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indld3p0cGFtemhyemJiZ3l1dHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MTE5MzAsImV4cCI6MjA3OTM4NzkzMH0.PfmIQFT6QFZFAc_sseoaSqFNKbE_F1dua3J4G1SKkws";
        proxy_set_header Host wewztpamzhrzbbgyutyf.supabase.co;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        rewrite ^ /functions/v1/serve-share-page?token=$token break;
        proxy_pass https://wewztpamzhrzbbgyutyf.supabase.co;
    }

    # 3. Dynamic Exercise Page Routing
    location ~* ^/exercises?/([a-zA-Z0-9_\-]+)/?$ {
        set $slug $1;
        error_page 418 = @exercise_bot_proxy;
        if ($is_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    # 4. Named location for exercise bot proxying
    location @exercise_bot_proxy {
        proxy_set_header apikey "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indld3p0cGFtemhyemJiZ3l1dHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MTE5MzAsImV4cCI6MjA3OTM4NzkzMH0.PfmIQFT6QFZFAc_sseoaSqFNKbE_F1dua3J4G1SKkws";
        proxy_set_header Authorization "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indld3p0cGFtemhyemJiZ3l1dHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MTE5MzAsImV4cCI6MjA3OTM4NzkzMH0.PfmIQFT6QFZFAc_sseoaSqFNKbE_F1dua3J4G1SKkws";
        proxy_set_header Host wewztpamzhrzbbgyutyf.supabase.co;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        rewrite ^ /functions/v1/serve-exercise-page?slug=$slug break;
        proxy_pass https://wewztpamzhrzbbgyutyf.supabase.co;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve exercise thumbnails directly from /var/www/gymguide/exercise/
    location ~* ^/exercise/.*\.jpg$ {
        root /var/www/gymguide;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.gymguide.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.gymguide.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.gymguide.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name www.gymguide.co;
    return 404; # managed by Certbot
}

server {
    if ($host = gymguide.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name gymguide.co;
    return 404; # managed by Certbot
}
